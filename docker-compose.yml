services:
  stock-analysis:
    image: rockdong13/stock_for_cpp:v2
    container_name: stock-analysis-dev
    volumes:
      - ./logs:/app/logs
      - ./data/stock.db:/app/stock.db
    ports:
      - "3000:3000"
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
      - NODE_ENV=development
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  sqlite-browser:
    image: coleifer/sqlite-web
    container_name: stock-db-browser
    volumes:
      - ./data/stock.db:/data/stock.db
    ports:
      - "8080:8080"
    environment:
      - SQLITE_DATABASE=stock.db
    restart: unless-stopped
    profiles:
      - db

  dozzle:
    image: amir20/dozzle:latest
    container_name: stock-log-monitor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/logs
    ports:
      - "8888:8080"
    environment:
      - DOZZLE_HOSTNAME=stock-analysis
    restart: unless-stopped
    profiles:
      - tools
