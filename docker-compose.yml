services:
  stock-analysis:
    image: rockdong13/stock_for_cpp:master
    container_name: stock-analysis-dev
    platform: linux/amd64
    ports:
      - "3000:3000"
      - "8080:8080"
    env_file:
      - ./env/.env
    environment:
      - TZ=Asia/Shanghai
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dozzle:
    image: amir20/dozzle:latest
    container_name: stock-log-monitor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8888:8080"
    environment:
      - DOZZLE_HOSTNAME=stock-analysis
    restart: unless-stopped