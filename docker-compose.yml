services:
  stock-analysis:
    image: rockdong13/stock_for_cpp:master
    container_name: stock-analysis-dev
    platform: linux/amd64
    ports:
      - "3000:3000"
      - "5173:5173"
      - "8080:8080"
    env_file:
      - ./env/.env
    environment:
      - TZ=Asia/Shanghai
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

