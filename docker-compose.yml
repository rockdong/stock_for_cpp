version: '3.8'

services:
  stock-analysis:
    image: rockdong/stock_for_cpp
    container_name: stock-analysis-dev
    volumes:
      - ./stock.db:/app/stock.db
      - ./logs:/app/logs
    ports:
      - "3000:3000"
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
      - NODE_ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 可选：SQLite数据库管理界面
  sqlite-browser:
    image: coleifer/sqlite-web
    container_name: stock-db-browser
    volumes:
      - ./stock.db:/data/stock.db
    ports:
      - "8080:8080"
    environment:
      - SQLITE_DATABASE=stock.db
    restart: unless-stopped
    profiles:
      - tools  # 只在需要时启动

  # 可选：日志监控工具
  dozzle:
    image: amir20/dozzle:latest
    container_name: stock-log-monitor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/logs
    ports:
      - "8888:8080"
    environment:
      - DOZZLE_HOSTNAME=stock-analysis
    restart: unless-stopped
    profiles:
      - tools