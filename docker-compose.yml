services:
  stock-cpp:
    image: rockdong13/stock_for_cpp:master
    container_name: stock-cpp-engine
    platform: linux/amd64
    env_file:
      - ./env/.env
    environment:
      - TZ=Asia/Shanghai
      - DB_TYPE=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=stock_db
      - DB_USER=stock_user
      - DB_PASSWORD=stock_password
    depends_on:
      mysql:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: stock-mysql
    platform: linux/amd64
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=stock_root_password
      - MYSQL_DATABASE=stock_db
      - MYSQL_USER=stock_user
      - MYSQL_PASSWORD=stock_password
      - TZ=Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pstock_root_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  stock-bot:
    image: rockdong13/stock_for_cpp_bot:master
    container_name: stock-feishu-bot
    platform: linux/amd64
    ports:
      - "3000:3000"
    env_file:
      - ./env/.env
    environment:
      - TZ=Asia/Shanghai
      - DB_TYPE=mysql
      - DATABASE_URL=mysql://stock_user:stock_password@mysql:3306/stock_db?connection_limit=10&pool_timeout=30&connect_timeout=30
      - PORT=3000
    depends_on:
      mysql:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  api-server:
    image: rockdong13/stock_for_cpp_api:master
    container_name: stock-api-server
    platform: linux/amd64
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=mysql://stock_user:stock_password@mysql:3306/stock_db?connection_limit=10&pool_timeout=30&connect_timeout=30
      - STRATEGIES=EMA25_GREATER_17_PRICE_MATCH
      - SCHEDULER_EXECUTE_TIME=20:00
      - PORT=3001
      - TZ=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  web-frontend:
    image: rockdong13/stock_for_cpp_web:master
    container_name: stock-web-frontend
    platform: linux/amd64
    ports:
      - "80:80"
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      api-server:
        condition: service_started
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: stock-db-admin
    platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=mysql
      - TZ=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

volumes:
  mysql_data:

