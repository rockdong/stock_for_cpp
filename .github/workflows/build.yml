name: 🚀 构建并发布 Docker 镜像

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  DOCKER_IMAGE_NAME: stock_for_cpp

jobs:
  build-cpp-ubuntu:
    name: 🏗️ 编译 C++ (Ubuntu)
    runs-on: ubuntu-latest

    steps:
    - name: 📥 检出代码仓库
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: 🔧 安装构建依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libsqlite3-dev libssl-dev

    - name: ⚙️ 配置 CMake (使用 cpp 目录)
      run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

    - name: 🏗️ 编译项目
      run: cmake --build cpp/build --config ${{ env.BUILD_TYPE }} -- -j$(nproc)
      env:
        BUILD_NUMBER: ${{ github.run_number }}

    - name: 📤 上传 C++ 构建产物 (Ubuntu)
      uses: actions/upload-artifact@v4
      with:
        name: cpp-build-ubuntu
        path: |
          cpp/build/stock_for_cpp
          cpp/build/version.h

  build-cpp-macos:
    name: 🏗️ 编译 C++ (macOS)
    runs-on: macos-latest

    steps:
    - name: 📥 检出代码仓库
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: 🔧 安装构建依赖
      run: |
        brew install cmake sqlite3 openssl@3

    - name: ⚙️ 配置 CMake (使用 cpp 目录)
      run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)

    - name: 🏗️ 编译项目
      run: cmake --build cpp/build --config ${{ env.BUILD_TYPE }} -- -j$(sysctl -n hw.ncpu)
      env:
        BUILD_NUMBER: ${{ github.run_number }}

    - name: 📤 上传 C++ 构建产物 (macOS)
      uses: actions/upload-artifact@v4
      with:
        name: cpp-build-macos
        path: |
          cpp/build/stock_for_cpp
          cpp/build/version.h

  build-nodejs:
    name: 📦 构建 Node.js 项目
    runs-on: ubuntu-latest

    steps:
    - name: 📥 检出代码仓库
      uses: actions/checkout@v4

    - name: 📦 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🔧 安装 canvas 系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

    - name: 📦 安装 Node.js 依赖
      working-directory: nodejs
      run: npm install

    - name: 📤 上传 Node.js 产物
      uses: actions/upload-artifact@v4
      with:
        name: nodejs-build
        path: |
          nodejs/src
          nodejs/package.json

  docker:
    name: 🐳 构建并推送 Docker 镜像
    runs-on: ubuntu-latest
    needs: [build-cpp-ubuntu, build-nodejs]
    if: github.event_name != 'pull_request'

    steps:
      - name: 📥 检出代码仓库
        uses: actions/checkout@v4

      - name: 📦 下载 C++ 构建产物 (Ubuntu)
        uses: actions/download-artifact@v4
        with:
          name: cpp-build-ubuntu
          path: cpp/build/

      - name: 📦 下载 Node.js 产物
        uses: actions/download-artifact@v4
        with:
          name: nodejs-build
          path: nodejs/

      - name: 🔑 设置可执行权限
        run: chmod +x cpp/build/stock_for_cpp

      - name: 🔧 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔧 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🔐 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: 🚀 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
