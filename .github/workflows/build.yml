name: 🚀 构建并发布 Docker 镜像

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  DOCKER_IMAGE_NAME: stock_for_cpp
  DOCKER_IMAGE_NAME_API: stock_for_cpp_api
  DOCKER_IMAGE_NAME_WEB: stock_for_cpp_web
  DOCKER_IMAGE_NAME_BOT: stock_for_cpp_bot

jobs:
  build-cpp:
    name: 🏗️ 编译 C++
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 检出代码仓库
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🔧 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libsqlite3-dev libssl-dev libmysqlclient-dev

      - name: ⚙️ 配置 CMake (使用 cpp 目录)
        run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: 🏗️ 编译项目
        run: cmake --build cpp/build --config ${{ env.BUILD_TYPE }} -- -j$(nproc)
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: 📤 上传 C++ 构建产物 (仅 PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: cpp-build-ubuntu
          path: |
            cpp/build/stock_for_cpp
            cpp/build/version.h

  docker-cpp:
    name: 🐳 构建并推送 C++ Docker 镜像
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: 📥 检出代码仓库
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🔧 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libsqlite3-dev libssl-dev libmysqlclient-dev

      - name: ⚙️ 配置 CMake
        run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: 🏗️ 编译项目
        run: cmake --build cpp/build --config ${{ env.BUILD_TYPE }} -- -j$(nproc)
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: 🔑 设置可执行权限
        run: chmod +x cpp/build/stock_for_cpp

      - name: 🔧 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: 🚀 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  docker-backend:
    name: 🐳 构建并推送 Backend API 镜像
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: 📥 检出代码仓库
        uses: actions/checkout@v4

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 安装依赖
        working-directory: backend
        run: npm install

      - name: 🔧 生成 Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: 🏗️ 构建 NestJS
        working-directory: backend
        run: npm run build

      - name: 🔧 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ 提取镜像元数据
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME_API }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: 🚀 构建并推送 Backend API 镜像
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  docker-web:
    name: 🐳 构建并推送 Web Frontend 镜像
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: 📥 检出代码仓库
        uses: actions/checkout@v4

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 安装依赖
        working-directory: web-frontend
        run: npm install

      - name: 🏗️ 构建 Vite 项目
        working-directory: web-frontend
        run: npm run build

      - name: 🔧 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ 提取镜像元数据
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME_WEB }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: 🚀 构建并推送 Web Frontend 镜像
        uses: docker/build-push-action@v5
        with:
          context: ./web-frontend
          file: ./web-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  docker-nodejs-bot:
    name: 🐳 构建并推送 Node.js Bot 镜像
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: 📥 检出代码仓库
        uses: actions/checkout@v4

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 安装 canvas 系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: 📦 安装 Node.js 依赖
        working-directory: nodejs
        run: npm install

      - name: 🔧 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ 提取镜像元数据
        id: meta-bot
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME_BOT }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: 🚀 构建并推送 Node.js Bot 镜像
        uses: docker/build-push-action@v5
        with:
          context: ./nodejs
          file: ./nodejs/Dockerfile
          push: true
          tags: ${{ steps.meta-bot.outputs.tags }}
          labels: ${{ steps.meta-bot.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
