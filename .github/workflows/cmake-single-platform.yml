# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: CMake build (single platform)

on:
  push:
    branches: [ "v2" ]
  pull_request:
    branches: [ "v2" ]
  # 支持在 GitHub Actions 界面手动触发
  workflow_dispatch:

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    # 单平台构建（如需多平台可改为 matrix）
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        sudo apt-get update
        # 基础工具 + SQLite 开发库（项目中链接 sqlite3）
        sudo apt-get install -y build-essential cmake libsqlite3-dev

    - name: Configure CMake
      # 在 build 目录下生成构建文件，使用项目自己的 CMakeLists.txt
      run: cmake -S ${{ github.workspace }} -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

    - name: Build
      # 编译可执行文件 stock_for_cpp
      run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }} -- -j$(nproc)

    - name: Test
      working-directory: ${{ github.workspace }}/build
      # 运行由 CMake 配置的测试（当前可能为空，但保持接口）
      run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure

    - name: Upload build artifact
      # 上传打包产物，方便在 GitHub Actions 页面下载
      uses: actions/upload-artifact@v4
      with:
        name: stock_for_cpp-${{ runner.os }}-${{ env.BUILD_TYPE }}
        path: |
          ${{ github.workspace }}/build/stock_for_cpp

