name: 🔨 构建并发布 Docker 镜像

on:
  push:
    branches: [ "v2" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "v2" ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  DOCKER_IMAGE_NAME: stock_for_cpp

jobs:
  build:
    name: 📦 编译 C++ 项目
    runs-on: ubuntu-latest

    steps:
    - name: 📥 检出代码仓库
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: 🔧 安装构建依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libsqlite3-dev

    - name: ⚙️ 配置 CMake
      run: cmake -S ${{ github.workspace }} -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

    - name: 🏗️ 编译项目
      run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }} -- -j$(nproc)
      env:
        BUILD_NUMBER: ${{ github.run_number }}

    - name: 🧪 运行测试
      working-directory: ${{ github.workspace }}/build
      run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure

    - name: 📤 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: stock_for_cpp-${{ runner.os }}-${{ env.BUILD_TYPE }}
        path: |
          ${{ github.workspace }}/build/stock_for_cpp

  docker:
    name: 🐳 构建并推送 Docker 镜像
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: 📥 检出代码仓库
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 📦 下载编译产物
        uses: actions/download-artifact@v4
        with:
          name: stock_for_cpp-${{ runner.os }}-${{ env.BUILD_TYPE }}
          path: build/

      - name: 🔑 设置可执行权限
        run: chmod +x build/stock_for_cpp

      - name: 🔧 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🚀 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: ✅ 镜像推送完成
        run: echo "🎉 Docker 镜像已成功推送到 Docker Hub！"

